name: HUMAID SOUL CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- Dictionary ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache NLTK data
        uses: actions/cache@v4
        with:
          path: ~/nltk_data
          key: nltk-${{ runner.os }}-${{ hashFiles('scripts/build_dictionary.py') }}
          restore-keys: nltk-${{ runner.os }}-
      - name: Build dictionary
        run: python scripts/build_dictionary.py
      - name: Verify dictionary exists
        run: |
          if [ ! -f soul_dict.db ]; then echo "ERROR: soul_dict.db not found"; exit 1; fi
          size=$(stat -c%s soul_dict.db 2>/dev/null || echo 0)
          if [ "$size" -lt 1000 ]; then echo "ERROR: dictionary too small"; exit 1; fi
      - name: Compress dictionary
        run: zstd -19 soul_dict.db -o soul_dict.db.zst
      - name: Copy dictionary to Flutter assets
        run: mkdir -p ui/assets && cp soul_dict.db.zst ui/assets/

      # ---------- Soul‑Packs ----------
      - name: Build Medical Soul‑Pack
        run: |
          python scripts/build_medical_dict.py
          zstd -19 medical.db -o medical.db.zst
      - name: Build Legal Soul‑Pack
        run: |
          python scripts/build_legal_dict.py
          zstd -19 legal.db -o legal.db.zst

      # ---------- Voice Models ----------
      - name: Install Python onnx for voice conversion
        run: pip install onnx
      - name: Build Piper voice models
        run: python scripts/build_piper_models.py

      # ---------- App Icon ----------
      - name: Install Pillow for icon generation
        run: pip install Pillow
      - name: Generate app icon
        run: python scripts/generate_icon.py ui/assets/icon

      # ---------- Rust cross-compilation ----------
      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: rust-${{ runner.os }}-${{ hashFiles('core/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-
      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
      - name: Setup Android NDK
        run: |
          ANDROID_NDK=$(ls $ANDROID_HOME/ndk/ | sort -r | head -1)
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$ANDROID_NDK" >> $GITHUB_ENV
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Build and copy Rust libraries
        working-directory: core
        run: |
          declare -A ABIS=(
            ["aarch64-linux-android"]="arm64-v8a"
            ["armv7-linux-androideabi"]="armeabi-v7a"
            ["x86_64-linux-android"]="x86_64"
          )
          for target in "${!ABIS[@]}"; do
            abi=${ABIS[$target]}
            cargo ndk -t "$target" build --release
            lib_path=$(find "target/$target/release" -maxdepth 1 -name '*.so' -print -quit)
            [ -z "$lib_path" ] && echo "Error: No .so for $target" && exit 1
            dest="../../../ui/android/app/src/main/jniLibs/$abi"
            mkdir -p "$dest"
            cp "$lib_path" "$dest/"
          done

      # ---------- Flutter APK ----------
      - name: Cache Flutter packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('ui/pubspec.yaml') }}
          restore-keys: flutter-${{ runner.os }}-
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
      - name: Generate Android project
        run: |
          rm -rf ui/android
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR"
          flutter create --project-name humaid_soul_ui --org com.humaid.soul temp_app
          cd -
          cp -r "$TEMP_DIR/temp_app/android" ui/
          cp "$TEMP_DIR/temp_app/gradlew" ui/android/ 2>/dev/null || true
          cp "$TEMP_DIR/temp_app/gradlew.bat" ui/android/ 2>/dev/null || true
          cp -r "$TEMP_DIR/temp_app/gradle" ui/android/ 2>/dev/null || true
          rm -rf "$TEMP_DIR"
          chmod +x ui/android/gradlew
      - name: Configure Android project
        run: |
          mkdir -p ui/android/app/proguard
          echo "-keep class com.syncfusion.** { *; }" > ui/android/app/proguard/proguard-rules.pro
          echo "-dontwarn com.syncfusion.**" >> ui/android/app/proguard/proguard-rules.pro

          # Copy adaptive icon components
          mkdir -p ui/android/app/src/main/res/mipmap-anydpi-v26
          if [ -f ui/assets/icon/ic_foreground.png ]; then
            cp ui/assets/icon/ic_foreground.png ui/android/app/src/main/res/mipmap-hdpi/
            cp ui/assets/icon/ic_foreground.png ui/android/app/src/main/res/mipmap-mdpi/
            cp ui/assets/icon/ic_foreground.png ui/android/app/src/main/res/mipmap-xhdpi/
            cp ui/assets/icon/ic_foreground.png ui/android/app/src/main/res/mipmap-xxhdpi/
            cp ui/assets/icon/ic_foreground.png ui/android/app/src/main/res/mipmap-xxxhdpi/
            cp ui/assets/icon/ic_background.png ui/android/app/src/main/res/mipmap-hdpi/
            cp ui/assets/icon/ic_background.png ui/android/app/src/main/res/mipmap-mdpi/
            cp ui/assets/icon/ic_background.png ui/android/app/src/main/res/mipmap-xhdpi/
            cp ui/assets/icon/ic_background.png ui/android/app/src/main/res/mipmap-xxhdpi/
            cp ui/assets/icon/ic_background.png ui/android/app/src/main/res/mipmap-xxxhdpi/
            cp ui/assets/icon/ic_launcher.xml ui/android/app/src/main/res/mipmap-anydpi-v26/
          fi

          # PDF intent filter
          MAIN_MANIFEST="ui/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MAIN_MANIFEST" ]; then
            sed -i '/<\/activity>/i \
            <intent-filter> \
                <action android:name="android.intent.action.VIEW"/> \
                <category android:name="android.intent.category.DEFAULT"/> \
                <category android:name="android.intent.category.BROWSABLE"/> \
                <data android:scheme="file"/> \
                <data android:scheme="content"/> \
                <data android:mimeType="application/pdf"/> \
            </intent-filter>' "$MAIN_MANIFEST"
          fi

          # ── Release signing (debug keystore) ──
          KEYSTORE="ui/android/app/humaid.keystore"
          if [ ! -f "$KEYSTORE" ]; then
            keytool -genkey -v \
              -keystore "$KEYSTORE" \
              -storepass humaid123 \
              -keypass humaid123 \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=HUMAID SOUL, OU=Dev, O=Humaid, L=Unknown, ST=Unknown, C=UN"
          fi
          # Write key.properties for Flutter to find
          cat > ui/android/key.properties << 'KEYEOF'
storePassword=humaid123
keyPassword=humaid123
keyAlias=my-key-alias
storeFile=../app/humaid.keystore
KEYEOF

      - name: Install Flutter dependencies
        working-directory: ui
        run: flutter pub get

      # Build debug APK
      - name: Build debug APK
        working-directory: ui
        run: flutter build apk --debug

      # Build release APK (signed)
      - name: Build release APK
        working-directory: ui
        run: flutter build apk --release

      # ---------- Upload artifacts ----------
      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: humaid-soul-debug-apk
          path: ui/build/app/outputs/flutter-apk/app-debug.apk

      - name: Upload release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: humaid-soul-release-apk
          path: ui/build/app/outputs/flutter-apk/app-release.apk

      - name: Upload dictionary
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: soul-dictionary
          path: soul_dict.db.zst
      - name: Upload Medical Soul‑Pack
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: medical-soul-pack
          path: medical.db.zst
      - name: Upload Legal Soul‑Pack
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: legal-soul-pack
          path: legal.db.zst
      - name: Upload Amy voice
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: amy-voice
          path: piper_models/amy.zip
      - name: Upload John voice
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: john-voice
          path: piper_models/john.zip
      - name: Upload Kristin voice
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: kristin-voice
          path: piper_models/kristin.zip
      - name: Upload Norman voice
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: norman-voice
          path: piper_models/norman.zip

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v') && success()
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ui/build/app/outputs/flutter-apk/app-release.apk
            ui/build/app/outputs/flutter-apk/app-debug.apk
            soul_dict.db.zst
            medical.db.zst
            legal.db.zst
            piper_models/amy.zip
            piper_models/john.zip
            piper_models/kristin.zip
            piper_models/norman.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
