name: Build HUMAID SOUL (unified)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- Dictionary ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build dictionary
        run: python scripts/build_dictionary.py
      - name: Compress dictionary
        run: zstd -19 soul_dict.db -o soul_dict.db.zst
      - name: Copy dictionary to Flutter assets
        run: mkdir -p ui/assets && cp soul_dict.db.zst ui/assets/

      # ---------- Rust cross-compilation ----------
      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android

      - name: Setup Android NDK
        run: |
          ANDROID_NDK=$(ls $ANDROID_HOME/ndk/ | sort -r | head -1)
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$ANDROID_NDK" >> $GITHUB_ENV

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Build and copy Rust libraries
        working-directory: core
        run: |
          declare -A ABIS=(
            ["aarch64-linux-android"]="arm64-v8a"
            ["armv7-linux-androideabi"]="armeabi-v7a"
            ["x86_64-linux-android"]="x86_64"
          )

          for target in "${!ABIS[@]}"; do
            abi=${ABIS[$target]}
            echo "Building for $target ($abi)..."
            cargo ndk -t "$target" build --release

            lib_path=$(find "target/$target/release" -maxdepth 1 -name '*.so' -print -quit)
            if [ -z "$lib_path" ]; then
              echo "Error: No .so found for target $target"
              exit 1
            fi
            echo "Found library: $lib_path"

            dest="../../../ui/android/app/src/main/jniLibs/$abi"
            mkdir -p "$dest"
            cp "$lib_path" "$dest/"
            echo "Copied to $dest/"
          done

      # ---------- Flutter setup & APK ----------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable

      - name: Generate missing Android project files
        run: |
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR"
          flutter create --project-name humaid_soul_ui --org com.humaid.soul temp_app
          cd -
          cp -r "$TEMP_DIR/temp_app/android" ui/
          rm -rf "$TEMP_DIR"

      - name: Install Flutter dependencies
        working-directory: ui
        run: flutter pub get

      - name: Build debug APK
        working-directory: ui
        run: flutter build apk --debug

      # ---------- Upload final APK ----------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: humaid-soul-debug-apk
          path: ui/build/app/outputs/flutter-apk/app-debug.apk
