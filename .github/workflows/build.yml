name: Build HUMAID SOUL (unified)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      # ---------- Checkout ----------
      - uses: actions/checkout@v4

      # ---------- Dictionary ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build dictionary
        run: python scripts/build_dictionary.py
      - name: Compress dictionary
        run: zstd -19 soul_dict.db -o soul_dict.db.zst
      - name: Copy dictionary to Flutter assets
        run: mkdir -p ui/assets && cp soul_dict.db.zst ui/assets/

      # ---------- Rust cross-compilation ----------
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android
          override: true
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Build Rust library (all targets)
        working-directory: core
        run: |
          cargo ndk -t aarch64-linux-android -o ../jniLibs build --release
          cargo ndk -t armv7-linux-androideabi -o ../jniLibs build --release
          cargo ndk -t x86_64-linux-android -o ../jniLibs build --release
      - name: Copy .so files into Flutter project
        run: |
          mkdir -p ui/android/app/src/main/jniLibs/arm64-v8a
          mkdir -p ui/android/app/src/main/jniLibs/armeabi-v7a
          mkdir -p ui/android/app/src/main/jniLibs/x86_64
          cp jniLibs/aarch64-linux-android/release/libhumaid_core.so ui/android/app/src/main/jniLibs/arm64-v8a/
          cp jniLibs/armv7-linux-androideabi/release/libhumaid_core.so ui/android/app/src/main/jniLibs/armeabi-v7a/
          cp jniLibs/x86_64-linux-android/release/libhumaid_core.so ui/android/app/src/main/jniLibs/x86_64/

      # ---------- Flutter APK ----------
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
      - name: Install Flutter dependencies
        working-directory: ui
        run: flutter pub get
      - name: Build debug APK
        working-directory: ui
        run: flutter build apk --debug

      # ---------- Upload final APK ----------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: humaid-soul-debug-apk
          path: ui/build/app/outputs/flutter-apk/app-debug.apk
