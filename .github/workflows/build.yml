name: HUMAID SOUL CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- Dictionary ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache NLTK data
        uses: actions/cache@v4
        with:
          path: ~/nltk_data
          key: nltk-${{ runner.os }}-${{ hashFiles('scripts/build_dictionary.py') }}
          restore-keys: nltk-${{ runner.os }}-
      - name: Build dictionary
        run: python scripts/build_dictionary.py
      - name: Verify dictionary exists
        run: |
          if [ ! -f soul_dict.db ]; then echo "ERROR: soul_dict.db not found"; exit 1; fi
          size=$(stat -c%s soul_dict.db 2>/dev/null || echo 0)
          if [ "$size" -lt 1000 ]; then echo "ERROR: dictionary too small"; exit 1; fi
      - name: Compress dictionary
        run: zstd -19 soul_dict.db -o soul_dict.db.zst
      - name: Copy dictionary to Flutter assets
        run: mkdir -p ui/assets && cp soul_dict.db.zst ui/assets/

      # ---------- Rust cross-compilation ----------
      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: rust-${{ runner.os }}-${{ hashFiles('core/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-
      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
      - name: Setup Android NDK
        run: |
          ANDROID_NDK=$(ls $ANDROID_HOME/ndk/ | sort -r | head -1)
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$ANDROID_NDK" >> $GITHUB_ENV
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Build and copy Rust libraries
        working-directory: core
        run: |
          declare -A ABIS=(
            ["aarch64-linux-android"]="arm64-v8a"
            ["armv7-linux-androideabi"]="armeabi-v7a"
            ["x86_64-linux-android"]="x86_64"
          )
          for target in "${!ABIS[@]}"; do
            abi=${ABIS[$target]}
            cargo ndk -t "$target" build --release
            lib_path=$(find "target/$target/release" -maxdepth 1 -name '*.so' -print -quit)
            [ -z "$lib_path" ] && echo "Error: No .so for $target" && exit 1
            dest="../../../ui/android/app/src/main/jniLibs/$abi"
            mkdir -p "$dest"
            cp "$lib_path" "$dest/"
          done

      # ---------- Flutter APK ----------
      - name: Cache Flutter packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('ui/pubspec.yaml') }}
          restore-keys: flutter-${{ runner.os }}-
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable

      # ===== PATCH FLUTTER SDK DEFAULT minSdkVersion =====
      - name: Patch Flutter Gradle Plugin minSdk default
        run: |
          GROOVY_FILE="$FLUTTER_ROOT/packages/flutter_tools/gradle/src/main/groovy/flutter.groovy"
          if [ -f "$GROOVY_FILE" ]; then
            echo "Patching flutter.groovy ..."
            sed -i 's/public final int minSdkVersion = 21/public final int minSdkVersion = 24/' "$GROOVY_FILE"
            grep 'minSdkVersion' "$GROOVY_FILE"
          else
            echo "WARNING: flutter.groovy not found at $GROOVY_FILE"
          fi

      # ===== REGENERATE ANDROID PROJECT =====
      - name: Generate Android project
        run: |
          rm -rf ui/android
          TEMP_DIR=$(mktemp -d)
          cd "$TEMP_DIR"
          flutter create --project-name humaid_soul_ui --org com.humaid.soul temp_app
          cd -
          cp -r "$TEMP_DIR/temp_app/android" ui/
          cp "$TEMP_DIR/temp_app/gradlew" ui/android/ 2>/dev/null || true
          cp "$TEMP_DIR/temp_app/gradlew.bat" ui/android/ 2>/dev/null || true
          cp -r "$TEMP_DIR/temp_app/gradle" ui/android/ 2>/dev/null || true
          rm -rf "$TEMP_DIR"
          chmod +x ui/android/gradlew

      # ===== OVERWRITE DEBUG MANIFEST – strip uses-sdk entirely =====
      - name: Neutralise debug manifest
        run: |
          cat > ui/android/app/src/debug/AndroidManifest.xml << 'XMLEOF'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
                    xmlns:tools="http://schemas.android.com/tools">
              <uses-permission android:name="android.permission.INTERNET"/>
          </manifest>
          XMLEOF

      # ===== SET SDK FLOOR =====
      - name: Configure SDK floor
        run: |
          # local.properties
          echo "flutter.minSdkVersion=24" >> ui/android/local.properties
          echo "flutter.compileSdkVersion=36" >> ui/android/local.properties

          # Hardcode build.gradle
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' ui/android/app/build.gradle
          sed -i 's/compileSdkVersion .*/compileSdkVersion 36/' ui/android/app/build.gradle

          # ProGuard rules
          mkdir -p ui/android/app/proguard
          echo "-keep class com.syncfusion.** { *; }" > ui/android/app/proguard/proguard-rules.pro
          echo "-dontwarn com.syncfusion.**" >> ui/android/app/proguard/proguard-rules.pro

          # PDF intent filter
          MAIN_MANIFEST="ui/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MAIN_MANIFEST" ]; then
            sed -i '/<\/activity>/i \
            <intent-filter> \
                <action android:name="android.intent.action.VIEW"/> \
                <category android:name="android.intent.category.DEFAULT"/> \
                <category android:name="android.intent.category.BROWSABLE"/> \
                <data android:scheme="file"/> \
                <data android:scheme="content"/> \
                <data android:mimeType="application/pdf"/> \
            </intent-filter>' "$MAIN_MANIFEST"
          fi

      # ===== SWITCH TO KOKORO OFFLINE NEURAL TTS =====
      - name: Update pubspec for kokoro TTS
        run: |
          # Remove flutter_tts dependency, add flutter_kokoro_tts
          sed -i '/flutter_tts/d' ui/pubspec.yaml
          sed -i '/flutter_kokoro_tts/d' ui/pubspec.yaml
          sed -i '/http: /a \  flutter_kokoro_tts: ^0.0.1' ui/pubspec.yaml

      - name: Update TTS service for Kokoro
        run: |
          cat > ui/lib/services/tts_service.dart << 'TTSEOF'
          import 'package:flutter_kokoro_tts/flutter_kokoro_tts.dart';

          class TtsService {
            final KokoroTts _tts = KokoroTts();
            bool _initialized = false;
            bool _speaking = false;
            Function(String)? onError;

            TtsService({this.onError});

            bool get isSpeaking => _speaking;
            bool get isAvailable => true;

            Future<bool> init() async {
              if (_initialized) return true;
              try {
                await _tts.initialize(
                  onProgress: (progress, status) {
                    // model download progress
                  },
                );
                _initialized = true;
              } catch (e) {
                onError?.call('Kokoro init failed: $e');
              }
              return _initialized;
            }

            Future<void> speak(String text) async {
              if (!_initialized) return;
              if (_speaking) await stop();
              _speaking = true;
              try {
                final audio = await _tts.generate(
                  text,
                  voice: 'Bella',
                  speed: 1.0,
                );
                // audio is Float32List at 24000 Hz
                // Playback integration via platform channel or audio plugin
              } catch (e) {
                onError?.call('Speech failed: $e');
              }
              _speaking = false;
            }

            Future<void> stop() async {
              _speaking = false;
            }

            Future<void> dispose() async {
              await _tts.dispose();
            }
          }
          TTSEOF

      - name: Install Flutter dependencies
        working-directory: ui
        run: flutter pub get
      - name: Build debug APK
        working-directory: ui
        run: flutter build apk --debug

      # ---------- Upload artifacts ----------
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: humaid-soul-debug-apk
          path: ui/build/app/outputs/flutter-apk/app-debug.apk
      - name: Upload dictionary artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: soul-dictionary
          path: soul_dict.db.zst

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v') && success()
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ui/build/app/outputs/flutter-apk/app-debug.apk
            soul_dict.db.zst
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
