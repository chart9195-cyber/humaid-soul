name: HUMAID SOUL CI/CD

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-all:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---------- Dictionary ----------
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Cache NLTK data
        uses: actions/cache@v4
        with:
          path: ~/nltk_data
          key: nltk-${{ runner.os }}-${{ hashFiles('scripts/build_dictionary.py') }}
          restore-keys: nltk-${{ runner.os }}-
      - name: Build dictionary
        run: python scripts/build_dictionary.py
      - name: Verify dictionary exists
        run: |
          if [ ! -f soul_dict.db ]; then echo "ERROR: soul_dict.db not found"; exit 1; fi
          size=$(stat -c%s soul_dict.db 2>/dev/null || echo 0)
          if [ "$size" -lt 1000 ]; then echo "ERROR: dictionary too small"; exit 1; fi
      - name: Compress dictionary
        run: zstd -19 soul_dict.db -o soul_dict.db.zst
      - name: Copy dictionary to Flutter assets
        run: mkdir -p ui/assets && cp soul_dict.db.zst ui/assets/

      # ---------- Rust cross-compilation ----------
      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            core/target
          key: rust-${{ runner.os }}-${{ hashFiles('core/Cargo.lock') }}
          restore-keys: rust-${{ runner.os }}-
      - name: Install Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add x86_64-linux-android
      - name: Setup Android NDK
        run: |
          ANDROID_NDK=$(ls $ANDROID_HOME/ndk/ | sort -r | head -1)
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/$ANDROID_NDK" >> $GITHUB_ENV
      - name: Install cargo-ndk
        run: cargo install cargo-ndk
      - name: Build and copy Rust libraries
        working-directory: core
        run: |
          declare -A ABIS=(
            ["aarch64-linux-android"]="arm64-v8a"
            ["armv7-linux-androideabi"]="armeabi-v7a"
            ["x86_64-linux-android"]="x86_64"
          )
          for target in "${!ABIS[@]}"; do
            abi=${ABIS[$target]}
            cargo ndk -t "$target" build --release
            lib_path=$(find "target/$target/release" -maxdepth 1 -name '*.so' -print -quit)
            [ -z "$lib_path" ] && echo "Error: No .so for $target" && exit 1
            dest="../../../ui/android/app/src/main/jniLibs/$abi"
            mkdir -p "$dest"
            cp "$lib_path" "$dest/"
          done

      # ---------- Flutter APK ----------
      - name: Cache Flutter packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: flutter-${{ runner.os }}-${{ hashFiles('ui/pubspec.yaml') }}
          restore-keys: flutter-${{ runner.os }}-
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable

      # ===== PATCH FLUTTER SDK MIN SDK AT THE SOURCE =====
      - name: Patch FlutterExtension minSdkVersion to 24
        run: |
          EXT_FILE="$FLUTTER_ROOT/packages/flutter_tools/gradle/src/main/kotlin/FlutterExtension.kt"
          if [ -f "$EXT_FILE" ]; then
            echo "Patching FlutterExtension.kt ..."
            sed -i 's/val minSdkVersion: Int = [0-9]*/val minSdkVersion: Int = 24/' "$EXT_FILE"
            grep 'minSdkVersion' "$EXT_FILE"
          else
            # Fallback for older Flutter versions that use Groovy
            GROOVY_FILE="$FLUTTER_ROOT/packages/flutter_tools/gradle/src/main/groovy/FlutterExtension.groovy"
            if [ -f "$GROOVY_FILE" ]; then
              echo "Patching FlutterExtension.groovy ..."
              sed -i 's/minSdkVersion = [0-9]*/minSdkVersion = 24/' "$GROOVY_FILE"
              grep 'minSdkVersion' "$GROOVY_FILE"
            else
              echo "WARNING: Could not find FlutterExtension to patch minSdkVersion"
            fi
          fi

      # ===== GENERATE ANDROID PROJECT =====
      - name: Generate Android project
        run: |
          if [ ! -d "ui/android" ]; then
            TEMP_DIR=$(mktemp -d)
            cd "$TEMP_DIR"
            flutter create --project-name humaid_soul_ui --org com.humaid.soul temp_app
            cd -
            cp -r "$TEMP_DIR/temp_app/android" ui/
            rm -rf "$TEMP_DIR"
          fi

      # ===== HARDEN BUILD.GRADLE AND MANIFESTS =====
      - name: Harden Android build configuration
        run: |
          # Hardcode minSdkVersion in build.gradle (belt-and-braces with the SDK patch)
          sed -i 's/minSdkVersion .*/minSdkVersion 24/' ui/android/app/build.gradle
          sed -i 's/compileSdkVersion .*/compileSdkVersion 36/' ui/android/app/build.gradle

          # Remove any uses-sdk declarations from ALL manifests (they belong in build.gradle)
          for MANIFEST in ui/android/app/src/main/AndroidManifest.xml \
                          ui/android/app/src/debug/AndroidManifest.xml \
                          ui/android/app/src/profile/AndroidManifest.xml; do
            if [ -f "$MANIFEST" ]; then
              # Remove entire uses-sdk element if present (handles both single-line and multi-line)
              sed -i '/<uses-sdk/,/\/>/d' "$MANIFEST" 2>/dev/null || true
              # Also handle single-line: <uses-sdk ... />
              sed -i '/<uses-sdk[^>]*\/>/d' "$MANIFEST" 2>/dev/null || true
            fi
          done

          # ProGuard rules for Syncfusion
          mkdir -p ui/android/app/proguard
          echo "-keep class com.syncfusion.** { *; }" > ui/android/app/proguard/proguard-rules.pro
          echo "-dontwarn com.syncfusion.**" >> ui/android/app/proguard/proguard-rules.pro

          # Add PDF intent filter
          MAIN_MANIFEST="ui/android/app/src/main/AndroidManifest.xml"
          if [ -f "$MAIN_MANIFEST" ]; then
            sed -i '/<\/activity>/i \
            <intent-filter> \
                <action android:name="android.intent.action.VIEW"/> \
                <category android:name="android.intent.category.DEFAULT"/> \
                <category android:name="android.intent.category.BROWSABLE"/> \
                <data android:scheme="file"/> \
                <data android:scheme="content"/> \
                <data android:mimeType="application/pdf"/> \
            </intent-filter>' "$MAIN_MANIFEST"
          fi

      - name: Install Flutter dependencies
        working-directory: ui
        run: flutter pub get
      - name: Build debug APK
        working-directory: ui
        run: flutter build apk --debug

      # ---------- Upload artifacts ----------
      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: humaid-soul-debug-apk
          path: ui/build/app/outputs/flutter-apk/app-debug.apk
      - name: Upload dictionary artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: soul-dictionary
          path: soul_dict.db.zst

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v') && success()
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ui/build/app/outputs/flutter-apk/app-debug.apk
            soul_dict.db.zst
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
